name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ai-review:
    name: AI Code Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: AI PR Review Placeholder
        run: |
          echo "AI PR Review Placeholder"
          echo ""
          echo "This workflow demonstrates the AI review integration point."
          echo "To enable actual AI review:"
          echo "1. Add ANTHROPIC_API_KEY to GitHub Secrets"
          echo "2. Enable claude-code-action in workflow"
          echo ""
          echo "AI Review Framework: C.L.E.A.R."
          echo "- Context: What is the purpose of this change?"
          echo "- Logic: Is the implementation sound?"
          echo "- Evidence: Are there tests and documentation?"
          echo "- Architecture: Does it follow project conventions?"
          echo "- Risk: What could go wrong?"

      - name: Comment PR with C.L.E.A.R. Framework
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            const aiComment = comments.find(comment => 
              comment.body.includes('AI PR Review Framework')
            );

            if (!aiComment) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `## AI PR Review Framework: C.L.E.A.R.\n\nThis PR will be reviewed using the C.L.E.A.R. framework:\n\n### Context\n- Understanding the purpose and scope of changes\n- Checking PR description completeness\n\n### Logic\n- Implementation correctness\n- Code flow and error handling\n- Edge cases considered\n\n### Evidence\n- Tests included and passing\n- Documentation updated\n\n### Architecture\n- Follows project conventions (CLAUDE.md)\n- Proper file organization\n\n### Risk\n- Security considerations\n- Performance impact\n- Breaking changes\n\n---\n**AI Disclosure:** This review uses Claude Code. Human review required.`
              });
            }
